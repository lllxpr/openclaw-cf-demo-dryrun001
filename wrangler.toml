name = "openclaw-cf-demo-dryrun001"
main = "src/index.ts"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[containers]]
class_name = "OpenClawContainer"
image = "docker.io/alpine/openclaw:main"
instance_type = "standard-2"
max_instances = 1

[[r2_buckets]]
binding = "OPENCLAW_R2"
bucket_name = "openclaw-data"

[[durable_objects.bindings]]
name = "OPENCLAW_CONTAINER"
class_name = "OpenClawContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OpenClawContainer"]
